<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Alarm Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #0f172a, #1e293b);
}

/* Card */
.loginContainer{
  width:100%;
  max-width:400px;
  padding:2rem;
  background: rgba(255,255,255,0.05);
  border-radius:15px;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  text-align:center;
  animation: fadeIn 0.8s ease-in-out;
  border: 1px solid rgba(255,255,255,0.1);
}

/* Title */
.loginContainer h1{
  font-size:2rem;
  margin-bottom:0.5rem;
  color:#38bdf8;
}

.loginContainer p{
  margin-bottom:1.5rem;
  color:#cbd5f5;
}

/* Inputs */
.loginContainer input{
  width:100%;
  padding:0.8rem 1rem;
  margin-bottom:1rem;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08);
  color:#fff;
  font-size:1rem;
  transition:0.3s;
}

.loginContainer input::placeholder{
  color:#94a3b8;
}

.loginContainer input:focus{
  border-color:#38bdf8;
  outline:none;
  box-shadow:0 0 10px rgba(56,189,248,0.5);
}

/* Button */
.loginContainer button{
  width:100%;
  padding:0.8rem;
  border:none;
  border-radius:8px;
  background: linear-gradient(135deg,#2563eb,#38bdf8);
  color:white;
  font-size:1.1rem;
  cursor:pointer;
  transition:0.3s;
}

.loginContainer button:hover{
  transform:translateY(-2px);
  box-shadow:0 5px 20px rgba(56,189,248,0.5);
}

/* Animation */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(-20px);}
  to{opacity:1; transform:translateY(0);}
}

/* Responsive */
@media(max-width:500px){
  .loginContainer{padding:1.5rem;}
}
</style>

</head>

<body>

<div class="loginContainer">
  <h1>🚨 Smart Alarm</h1>
  <p>Secure System Login</p>

  <input id="username" type="text" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
async function login(){
    const username = document.getElementById("username").value
    const password = document.getElementById("password").value

    try{
        const res = await fetch(window.location.origin + "/login",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({username,password})
        })

        const data = await res.json()

        if(data.success){
            window.location.href = "/dashboard.html"
        } else {
            alert("❌ Wrong username or password")
        }

    }catch(err){
        console.log(err)
        alert("❌ Server not reachable")
    }
}
</script>

</body>
</html>
