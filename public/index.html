<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Alarm Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* Reset */
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }

  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff4e50, #f9d423);
  }

  .loginContainer {
    width: 100%;
    max-width: 400px;
    padding: 2rem;
    background: rgba(255,255,255,0.95);
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    text-align: center;
    animation: fadeIn 0.8s ease-in-out;
  }

  .loginContainer h1 {
    font-size: 2rem;
    margin-bottom: 0.5rem;
    color: #ff4e50;
  }

  .loginContainer p {
    margin-bottom: 1.5rem;
    color: #555;
  }

  .loginContainer input {
    width: 100%;
    padding: 0.8rem 1rem;
    margin-bottom: 1rem;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 1rem;
    transition: 0.3s;
  }

  .loginContainer input:focus {
    border-color: #ff4e50;
    outline: none;
    box-shadow: 0 0 10px rgba(255,78,80,0.3);
  }

  .loginContainer button {
    width: 100%;
    padding: 0.8rem;
    border: none;
    border-radius: 8px;
    background: #ff4e50;
    color: white;
    font-size: 1.1rem;
    cursor: pointer;
    transition: 0.3s;
  }

  .loginContainer button:hover {
    background: #f94c4c;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(255,78,80,0.3);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media(max-width: 500px){
    .loginContainer { padding: 1.5rem; }
    .loginContainer h1 { font-size: 1.7rem; }
    .loginContainer input, .loginContainer button { font-size: 1rem; }
  }
</style>
</head>

<body>

<div class="loginContainer">
  <h1>🚨 Smart Alarm</h1>
  <p>Secure System Login</p>
  <input id="username" type="text" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<script>
async function login(){
    const username = document.getElementById("username").value
    const password = document.getElementById("password").value

    try{
        const res = await fetch(window.location.origin + "/login",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({username,password})
        })
        const data = await res.json()
        if(data.success){
            window.location.href = "/dashboard.html"
        } else {
            alert("❌ Wrong username or password")
        }
    }catch(err){
        console.log(err)
        alert("❌ Server not reachable")
    }
}
</script>

</body>
</html>
